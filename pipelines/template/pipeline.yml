# parameters:
---
  parameters:
    - name: PythonVersion
      type: string 
      values:
        - '3.9'
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
      default: '3.11'

  variables:
    PROJECT_DIR: 'Controllerhub-main/Controllerhub/ecommerce'   # folder that has manage.py
    REQS_FILE: 'Controllerhub/requirements.txt'                 # path to requirements.txt


  stages:
  - stage: "LinterStage"
    pool:
      vmImage: ubuntu-latest
    jobs:
    - job: InstallPython
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: ${{ parameters.PythonVersion }}
          displayName: 'Use Python ${{ parameters.PythonVersion }}'
    - job: RunLinters
      dependsOn: InstallPython
      steps:
        - script: |
            python -m pip install flake8
          displayName: "Install flake8"
        - script: |
            python -m pip install mypy
          displayName: "Install mypy"
        - bash: |
            echo "Running mypy linter..."
            python -m mypy . ; true
          displayName: "Linter Run (mypy)"
        - bash: |
            echo "Running flake8 linter..."
            python -m flake8 . ; true
          displayName: "Linter Run (flake8)"
  - stage: "UnitTestingStage"
    dependsOn: LinterStage
    pool:
      vmImage: ubuntu-latest
    jobs:
    - job: RunTestsAndPublish
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: ${{ parameters.PythonVersion }}
          displayName: 'Use Python ${{ parameters.PythonVersion }}'

        - script: |
            python -m pip install --upgrade pip
            pip install -r "$(REQS_FILE)"
            pip install unittest-xml-reporting coverage
          displayName: "Install Python Dependencies + test tooling"

        - script: |
            cd "$(PROJECT_DIR)"
            echo "Running Django tests under coverage in: $(PROJECT_DIR)"
            coverage run manage.py test \
              --testrunner xmlrunner.extra.djangotestrunner.XMLTestRunner \
              --no-input --verbosity=2 \
              --output-dir test-reports
            coverage xml
            coverage html
          displayName: "Run Django tests + coverage"

        - task: PublishTestResults@2
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '$(PROJECT_DIR)/test-reports/*.xml'
            testRunTitle: 'Django Unit Tests'
            failTaskOnFailedTests: true
          displayName: "Publish JUnit results"

        - task: PublishCodeCoverageResults@2
          inputs:
            codeCoverageTool: 'Cobertura'
            summaryFileLocation: '$(PROJECT_DIR)/coverage.xml'
            reportDirectory: '$(PROJECT_DIR)/htmlcov'
            failIfCoverageEmpty: true
          displayName: "Publish coverage summary"

        - task: PublishBuildArtifacts@1
          inputs:
            PathtoPublish: '$(PROJECT_DIR)/htmlcov'
            ArtifactName: 'coverage-html'
            publishLocation: 'Container'
          displayName: "Publish HTML coverage artifact"

  - stage: "DeploymentApprovalStage"
    dependsOn: UnitTestingStage
    pool: server
    jobs:
    - job: DeploymentApprovalJob
      steps:
        - task: ManualValidation@1
          inputs:
            instructions: 'Please approve the deployment.'
            timeoutInMinutes: 5
  - stage: "DeploymentStage"
    dependsOn: DeploymentApprovalStage
    pool:
      vmImage: ubuntu-latest
    jobs:
    - job: InstallPython
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: ${{ parameters.PythonVersion }}
          displayName: 'Use Python ${{ parameters.PythonVersion }}'
    - job: InstallDependencies
      dependsOn: InstallPython
      steps:
        - script: |
            python -m pip install -r requirements.txt
          displayName: "Install Python Depenencies"
    - job: RunDeployment
      dependsOn: InstallDependencies
      steps:
        - bash: |
            echo "Running Deployment..."
            # python test.py
          displayName: "Run Deployments"
