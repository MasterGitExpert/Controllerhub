
---
parameters:
  - name: PythonVersion
    type: string
    values: ['3.9','3.10','3.11','3.12','3.13']
    default: '3.11'



stages:


- stage: LinterStage
  pool:
    vmImage: ubuntu-latest
  jobs:
  - job: InstallPython
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.PythonVersion }}
        displayName: 'Use Python ${{ parameters.PythonVersion }}'

  - job: RunLinters
    dependsOn: InstallPython
    steps:
      - script: |
          python -m pip install --upgrade pip
          python -m pip install flake8 mypy
        displayName: "Install flake8 + mypy"
      - bash: |
          echo "Running mypy linter..."
          python -m mypy . ; true
        displayName: "Linter Run (mypy)"
      - bash: |
          echo "Running flake8 linter..."
          python -m flake8 . ; true
        displayName: "Linter Run (flake8)"


- stage: UnitTestingStage
  dependsOn: LinterStage
  pool:
    vmImage: ubuntu-latest
  jobs:
  - job: RunTestsAndPublish
    timeoutInMinutes: 60
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.PythonVersion }}
        displayName: 'Use Python ${{ parameters.PythonVersion }}'


      - bash: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "Installing from requirements.txt at repo root"
            pip install -r requirements.txt
          elif [ -f ecommerce/requirements.txt ]; then
            echo "Installing from ecommerce/requirements.txt"
            pip install -r ecommerce/requirements.txt
          else
            echo "requirements.txt not found; installing minimal deps"
            pip install django
          fi
          pip install unittest-xml-reporting coverage
        displayName: "Install Python dependencies + test tooling"

 
      - bash: |
          set -euo pipefail
          export PYTHONUNBUFFERED=1
          echo "Running Django tests under coverage in ecommerce/"
          ls -la ecommerce/manage.py || true
          timeout 20m python -u -m coverage run manage.py test \
            --testrunner xmlrunner.extra.djangotestrunner.XMLTestRunner \
            --no-input --verbosity=2
          coverage xml
          coverage html
        workingDirectory: ecommerce
        displayName: "Run Django tests + coverage"


      - task: PublishTestResults@2
        condition: always()
        displayName: "Publish JUnit results"
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/TEST-*.xml'
          searchFolder: '$(System.DefaultWorkingDirectory)'
          testRunTitle: 'Django Unit Tests'
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        condition: always()
        displayName: "Publish coverage summary"
        inputs:
          codeCoverageTool: 'Cobertura'
          summaryFileLocation: 'ecommerce/coverage.xml'
          reportDirectory: 'ecommerce/htmlcov'
          failIfCoverageEmpty: false

      - task: PublishBuildArtifacts@1
        condition: always()
        displayName: "Publish HTML coverage artifact"
        inputs:
          PathtoPublish: 'ecommerce/htmlcov'
          ArtifactName: 'coverage-html'
          publishLocation: 'Container'


- stage: DeploymentApprovalStage
  dependsOn: UnitTestingStage
  pool: server
  jobs:
  - job: DeploymentApprovalJob
    steps:
      - task: ManualValidation@1
        inputs:
          instructions: 'Please approve the deployment.'
          timeoutInMinutes: 5

- stage: DeploymentStage
  dependsOn: DeploymentApprovalStage
  pool:
    vmImage: ubuntu-latest
  jobs:
  - job: InstallPython
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.PythonVersion }}
        displayName: 'Use Python ${{ parameters.PythonVersion }}'

  - job: InstallDependencies
    dependsOn: InstallPython
    steps:
      - bash: |
          set -euo pipefail
          echo "Installing dependencies for deploy..."
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f ecommerce/requirements.txt ]; then
            pip install -r ecommerce/requirements.txt
          else
            pip install django
          fi
        displayName: "Install Python Dependencies (deploy)"

  - job: RunDeployment
    dependsOn: InstallDependencies
    steps:
      - bash: |
          echo "Running Deployment..."
          # Add real deployment steps here (collectstatic/migrate/deploy)
        displayName: "Run Deployments"
